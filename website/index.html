<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awesome Tech Repos 2026 - Curated GitHub Repositories</title>
    <meta name="description" content="A curated collection of ~1000 high-quality GitHub repositories organized by tech domain">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="banner">
                <img src="banner.jpg" alt="Awesome Tech Repos 2026 Banner">
            </div>
            <h1>Awesome Tech Repos 2026</h1>
            <p class="subtitle">A curated collection of 1000 high-quality GitHub repositories</p>
            <div class="stats">
                <div class="stat">
                    <span class="stat-number" id="total-repos">0</span>
                    <span class="stat-label">Repositories</span>
                </div>
                <div class="stat">
                    <span class="stat-number">12</span>
                    <span class="stat-label">Categories</span>
                </div>
                <div class="stat">
                    <span class="stat-number">5000+</span>
                    <span class="stat-label">Min Stars</span>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="search-section">
            <input type="text" id="search-input" placeholder="Search repositories...">
            <select id="category-filter">
                <option value="">All Categories</option>
                <option value="web-dev">Web Development</option>
                <option value="mobile-dev">Mobile Development</option>
                <option value="ai-agents">AI & Agents</option>
                <option value="ml-dl">ML & Deep Learning</option>
                <option value="data-science">Data Science</option>
                <option value="data-engineering">Data Engineering</option>
                <option value="devops-cloud">DevOps & Cloud</option>
                <option value="cybersecurity">Cybersecurity</option>
                <option value="embedded-iot">Embedded & IoT</option>
                <option value="robotics">Robotics</option>
                <option value="programming-languages">Programming Languages</option>
                <option value="dev-tools">Developer Tools</option>
            </select>
            <select id="level-filter">
                <option value="">All Levels</option>
                <option value="Beginner">Beginner</option>
                <option value="Intermediate">Intermediate</option>
                <option value="Advanced">Advanced</option>
            </select>
        </section>

        <section id="categories-container">
            <!-- Categories will be dynamically loaded here -->
        </section>

        <section id="repositories-container">
            <!-- Repositories will be dynamically loaded here -->
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Awesome Tech Repos 2026. Built for the open-source community.</p>
            <p>
                <a href="https://github.com/Faridadss7/awesome-tech-repos-2026" target="_blank" rel="noopener noreferrer">GitHub Repository</a> |
                <a href="https://github.com/Faridadss7/awesome-tech-repos-2026/issues" target="_blank" rel="noopener noreferrer">Report Issue</a>
            </p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
